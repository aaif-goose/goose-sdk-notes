<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#5f6672"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <!-- Diagonal stripe pattern for "Not started" items -->
    <pattern id="stripeGreen" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#e9eafa"/>
      <rect width="3" height="8" fill="#100f51" fill-opacity="0.22"/>
    </pattern>
    <pattern id="stripeGreenInline" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#ffffff"/>
      <rect width="2" height="6" fill="#100f51" fill-opacity="0.28"/>
    </pattern>
  </defs>

  <rect width="1040" height="880" fill="#ffffff"/>

  <!-- Title -->
  <text x="20" y="20" font-size="13" font-weight="700" fill="#100f51">Goose Development Kit</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- KEY                                         -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="20" y="35" width="220" height="120" rx="8" fill="#ffffff" stroke="#c9c9d6" stroke-width="1"/>
  <text x="40" y="57" font-size="11" font-weight="700" fill="#100f51">Key</text>
  <line x1="40" y1="65" x2="220" y2="65" stroke="#c9c9d6" stroke-width="1"/>
  <rect x="40" y="73" width="14" height="14" rx="3" fill="none" stroke="#100f51" stroke-width="2"/>
  <text x="62" y="85" font-size="10" fill="#100f51">Goose core responsibility</text>
  <rect x="40" y="93" width="14" height="14" rx="3" fill="none" stroke="#0000ff" stroke-width="2"/>
  <text x="62" y="105" font-size="10" fill="#100f51">Community &amp; 3rd party</text>
  <rect x="40" y="113" width="14" height="14" rx="3" fill="none" stroke="#ff00ff" stroke-width="2"/>
  <text x="62" y="125" font-size="10" fill="#100f51">Open protocols &amp; standards</text>
  <rect x="40" y="133" width="14" height="14" rx="3" fill="url(#stripeGreen)" stroke="#100f51" stroke-width="2"/>
  <text x="62" y="145" font-size="10" fill="#100f51">In progress</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SURFACES: a row of peer clients floating    -->
  <!-- above ACP, plus Applications over the       -->
  <!-- Rust API arm                                 -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Reference Desktop -->
  <rect x="150" y="190" width="150" height="44" rx="8" fill="#e9eafa" stroke="#100f51" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="225" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#100f51">Reference Desktop</text>
  <text x="225" y="225" text-anchor="middle" font-size="9" fill="#5f6672">first-party reference UI</text>
  <line x1="240" y1="234" x2="415" y2="280" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Buzz -->
  <rect x="315" y="190" width="90" height="44" rx="8" fill="#ffffff" stroke="#0000ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="216" text-anchor="middle" font-size="12" font-weight="600" fill="#100f51">Buzz</text>
  <line x1="380" y1="234" x2="465" y2="280" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Block's enterprise client -->
  <rect x="420" y="190" width="140" height="44" rx="8" fill="#ffffff" stroke="#0000ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="490" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="#100f51">Block&#8217;s enterprise</text>
  <text x="490" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#100f51">client</text>
  <line x1="510" y1="234" x2="540" y2="280" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Goose Perception ↔ ACP -->
  <rect x="575" y="190" width="115" height="44" rx="8" fill="#ffffff" stroke="#0000ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="632" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#100f51">Goose</text>
  <text x="632" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#100f51">Perception</text>
  <line x1="632" y1="234" x2="625" y2="280" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ... (future experiences) -->
  <rect x="702" y="190" width="55" height="44" rx="8" fill="#ffffff" stroke="#0000ff" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="729" y="217" text-anchor="middle" font-size="14" font-weight="600" fill="#5f6672">…</text>
  <line x1="725" y1="234" x2="705" y2="280" stroke="#5f6672" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Applications (blue app surface) — sits directly over the Rust API arm -->
  <rect x="775" y="190" width="140" height="44" rx="8" fill="#ffffff" stroke="#0000ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="845" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#100f51">Applications …</text>
  <text x="845" y="225" text-anchor="middle" font-size="9" fill="#5f6672">embedder / host app</text>

  <!-- Applications --> Rust API arm (in-process, peer of ACP) -->
  <line x1="855" y1="234" x2="840" y2="277" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Applications --> ACP (protocol route) -->
  <line x1="800" y1="234" x2="715" y2="280" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ACP protocol bar (rides on the Rust API)   -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="400" y="282" width="330" height="42" rx="8" fill="#ffe6ff" stroke="#ff00ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="565" y="308" text-anchor="middle" font-size="14" font-weight="700" fill="#ff00ff">ACP</text>

  <!-- Reference CLI — first-party binary, in-process on the Rust API -->
  <rect x="245" y="335" width="120" height="44" rx="8" fill="#e9eafa" stroke="#100f51" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="305" y="355" text-anchor="middle" font-size="12" font-weight="700" fill="#100f51">Reference CLI</text>
  <text x="305" y="370" text-anchor="middle" font-size="9" fill="#5f6672">first-party binary</text>
  <line x1="365" y1="357" x2="398" y2="357" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- RUST API — L-shaped layer:                  -->
  <!-- horizontal bar under ACP (ACP depends on  -->
  <!-- it), vertical arm rising beside ACP as a   -->
  <!-- peer surface for in-process embedding       -->
  <!-- ═══════════════════════════════════════════ -->
  <path d="M 408 338
           H 746 Q 750 338 750 334
           V 290 Q 750 282 758 282
           H 882 Q 890 282 890 290
           V 368 Q 890 376 882 376
           H 408 Q 400 376 400 368
           V 346 Q 400 338 408 338 Z"
        fill="url(#stripeGreen)" stroke="#100f51" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="820" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#100f51">Rust API</text>
  <text x="820" y="336" text-anchor="middle" font-size="9" fill="#5f6672">native crate / FFI</text>
  <text x="420" y="361" font-size="10" fill="#100f51" fill-opacity="0.85">in-process</text>

  <!-- ACP sits on the Rust API -->
  <line x1="470" y1="326" x2="470" y2="336" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="326" x2="660" y2="336" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Rust API sits on Goose Core -->
  <line x1="470" y1="378" x2="470" y2="393" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="378" x2="660" y2="393" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Language bindings — small, off the side of the Rust API arm -->
  <rect x="920" y="288" width="100" height="26" rx="6" fill="url(#stripeGreen)" stroke="#100f51" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="970" y="305" text-anchor="middle" font-size="10" font-weight="700" fill="#100f51">Swift</text>
  <line x1="920" y1="301" x2="893" y2="301" stroke="#5f6672" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="920" y="320" width="100" height="26" rx="6" fill="url(#stripeGreen)" stroke="#100f51" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="970" y="337" text-anchor="middle" font-size="10" font-weight="700" fill="#100f51">Kotlin</text>
  <line x1="920" y1="333" x2="893" y2="333" stroke="#5f6672" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="920" y="352" width="100" height="26" rx="6" fill="#e9eafa" stroke="#100f51" stroke-width="1.2" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="970" y="363" text-anchor="middle" font-size="10" font-weight="700" fill="#100f51">…</text>
  <text x="970" y="373" text-anchor="middle" font-size="7" fill="#5f6672">Python · TS · Go</text>
  <line x1="920" y1="365" x2="893" y2="365" stroke="#5f6672" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- GOOSE CORE                                  -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="400" y="395" width="490" height="170" rx="12" fill="#ffffff" stroke="#100f51" stroke-width="2" filter="url(#shadow)"/>
  <text x="645" y="421" text-anchor="middle" font-size="15" font-weight="700" fill="#100f51">Goose Core</text>
  <line x1="420" y1="431" x2="870" y2="431" stroke="#c9c9d6" stroke-width="1"/>

  <text x="430" y="451" font-size="10" fill="#100f51">• Agent loop</text>
  <text x="430" y="467" font-size="10" fill="#100f51">• Sessions</text>
  <text x="430" y="483" font-size="10" fill="#100f51">• Extensions</text>
  <text x="430" y="499" font-size="10" fill="#100f51">• Security</text>
  <text x="430" y="515" font-size="10" fill="#100f51">• Code Mode</text>
  <text x="620" y="451" font-size="10" fill="#100f51">• Subagents</text>
  <text x="620" y="467" font-size="10" fill="#100f51">• Context mgmt</text>
  <text x="620" y="483" font-size="10" fill="#100f51">• Automations &amp; scheduling</text>
  <!-- Striped underlays for "in progress" items -->
  <rect x="618" y="489" width="160" height="13" rx="2" fill="url(#stripeGreenInline)" stroke="#100f51" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="620" y="499" font-size="10" fill="#100f51">• Pluggable memory system</text>
  <rect x="618" y="505" width="160" height="13" rx="2" fill="url(#stripeGreenInline)" stroke="#100f51" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="620" y="515" font-size="10" fill="#100f51">• Sandbox / run anywhere</text>
  <rect x="618" y="521" width="160" height="13" rx="2" fill="url(#stripeGreenInline)" stroke="#100f51" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="620" y="531" font-size="10" fill="#100f51">• Router / model selection</text>
  <rect x="618" y="537" width="160" height="13" rx="2" fill="url(#stripeGreenInline)" stroke="#100f51" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="620" y="547" font-size="10" fill="#100f51">• Benchmarking</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- MCP / Skills / Plugins — LEFT of Core       -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="240" y="395" width="130" height="40" rx="8" fill="#ffffff" stroke="#ff00ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="305" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#ff00ff">MCP</text>

  <rect x="240" y="445" width="130" height="40" rx="8" fill="#ffffff" stroke="#ff00ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="305" y="470" text-anchor="middle" font-size="12" font-weight="600" fill="#ff00ff">Skills</text>

  <rect x="240" y="495" width="130" height="40" rx="8" fill="#ffffff" stroke="#ff00ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="305" y="520" text-anchor="middle" font-size="12" font-weight="600" fill="#ff00ff">Plugins</text>

  <!-- Goose Core ← MCP / Skills / Plugins (arrows from left into Core) -->
  <line x1="370" y1="415" x2="400" y2="437" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="465" x2="400" y2="465" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="515" x2="400" y2="500" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- PROVIDERS LAYER                             -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Goose Core --> Providers bar -->
  <line x1="590" y1="565" x2="590" y2="625" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Providers bar -->
  <rect x="160" y="625" width="800" height="42" rx="8" fill="#e9eafa" stroke="#100f51" stroke-width="2" filter="url(#shadow)"/>
  <text x="320" y="651" text-anchor="middle" font-size="14" font-weight="700" fill="#100f51">Providers</text>

  <!-- Router chip nested inside Providers bar (see "Router / model selection" in Core) -->
  <rect x="780" y="634" width="160" height="24" rx="6" fill="url(#stripeGreen)" stroke="#100f51" stroke-width="1.5"/>
  <text x="860" y="651" text-anchor="middle" font-size="11" font-weight="700" fill="#100f51">Router</text>

  <!-- Lines from Providers bar down to each child -->
  <line x1="230" y1="667" x2="230" y2="725" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="667" x2="450" y2="725" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="670" y1="667" x2="670" y2="725" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="880" y1="667" x2="880" y2="725" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Cloud Models -->
  <rect x="150" y="725" width="160" height="60" rx="10" fill="#ffffff" stroke="#100f51" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="750" text-anchor="middle" font-size="12" font-weight="700" fill="#100f51">Cloud Models</text>
  <text x="230" y="767" text-anchor="middle" font-size="9" fill="#5f6672">OpenAI · Anthropic · Google</text>
  <text x="230" y="779" text-anchor="middle" font-size="9" fill="#5f6672">Azure · Bedrock · …</text>

  <!-- Declarative Providers -->
  <rect x="360" y="725" width="180" height="60" rx="10" fill="#ffffff" stroke="#100f51" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="745" text-anchor="middle" font-size="12" font-weight="700" fill="#100f51">Declarative</text>
  <text x="450" y="760" text-anchor="middle" font-size="12" font-weight="700" fill="#100f51">Providers</text>
  <text x="450" y="779" text-anchor="middle" font-size="9" fill="#5f6672">YAML / config-driven</text>

  <!-- Local Models -->
  <rect x="600" y="725" width="140" height="60" rx="10" fill="#ffffff" stroke="#100f51" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="750" text-anchor="middle" font-size="12" font-weight="700" fill="#100f51">Local Models</text>
  <text x="670" y="767" text-anchor="middle" font-size="9" fill="#5f6672">Ollama · llama.cpp</text>
  <text x="670" y="779" text-anchor="middle" font-size="9" fill="#5f6672">GGUF · MLX</text>

  <!-- Mesh -->
  <rect x="810" y="725" width="140" height="60" rx="10" fill="#ffffff" stroke="#100f51" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="880" y="750" text-anchor="middle" font-size="12" font-weight="700" fill="#100f51">Mesh</text>
  <text x="880" y="767" text-anchor="middle" font-size="9" fill="#5f6672">Distributed inference</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ACP connects directly to the Providers bar  -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="260" y="820" width="160" height="42" rx="8" fill="#ffe6ff" stroke="#ff00ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="846" text-anchor="middle" font-size="13" font-weight="700" fill="#ff00ff">ACP</text>

  <!-- Providers bar left edge down to ACP -->
  <polyline points="160,646 80,646 80,841 260,841" fill="none" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Other Agents — a natural-looking cascade of cards -->
  <text x="500" y="798" font-size="9" font-style="italic" fill="#5f6672">Other Agents</text>

  <rect x="521" y="804" width="150" height="40" rx="8" fill="#ffffff" stroke="#0000ff" stroke-width="1" stroke-opacity="0.55"/>
  <text x="533" y="818" font-size="10" font-weight="600" fill="#100f51" fill-opacity="0.55">Gemini CLI …</text>

  <rect x="505" y="820" width="150" height="40" rx="8" fill="#f6f6fb" stroke="#0000ff" stroke-width="1.2" stroke-opacity="0.75"/>
  <text x="517" y="834" font-size="10" font-weight="600" fill="#100f51" fill-opacity="0.75">Codex</text>

  <rect x="489" y="836" width="150" height="40" rx="8" fill="#ffffff" stroke="#0000ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="564" y="861" text-anchor="middle" font-size="11" font-weight="600" fill="#100f51">Claude Code</text>

  <!-- Agents --> ACP -->
  <line x1="489" y1="852" x2="420" y2="846" stroke="#5f6672" stroke-width="1.5" marker-end="url(#arr)"/>

</svg>
