<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#8b949e"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <!-- Diagonal stripe pattern for "Not started" items -->
    <pattern id="stripeGreen" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#0f1d0b"/>
      <rect width="3" height="8" fill="#7ee787" fill-opacity="0.22"/>
    </pattern>
    <pattern id="stripeGreenInline" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#161b22"/>
      <rect width="2" height="6" fill="#7ee787" fill-opacity="0.28"/>
    </pattern>
  </defs>

  <rect width="1040" height="880" fill="#0d1117"/>

  <!-- Title -->
  <text x="20" y="20" font-size="13" font-weight="700" fill="#e6edf3">Goose SDK — architecture</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- KEY                                         -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="20" y="35" width="220" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="40" y="57" font-size="11" font-weight="700" fill="#e6edf3">Key</text>
  <line x1="40" y1="65" x2="220" y2="65" stroke="#30363d" stroke-width="1"/>
  <rect x="40" y="73" width="14" height="14" rx="3" fill="none" stroke="#7ee787" stroke-width="2"/>
  <text x="62" y="85" font-size="10" fill="#e6edf3">Goose core responsibility</text>
  <rect x="40" y="93" width="14" height="14" rx="3" fill="none" stroke="#58a6ff" stroke-width="2"/>
  <text x="62" y="105" font-size="10" fill="#e6edf3">Community &amp; 3rd party</text>
  <rect x="40" y="113" width="14" height="14" rx="3" fill="none" stroke="#ffa657" stroke-width="2"/>
  <text x="62" y="125" font-size="10" fill="#e6edf3">Open protocols &amp; standards</text>
  <rect x="40" y="133" width="14" height="14" rx="3" fill="url(#stripeGreen)" stroke="#7ee787" stroke-width="2"/>
  <text x="62" y="145" font-size="10" fill="#e6edf3">Not started</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SURFACES: Reference Desktop client, TUI    -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Reference Desktop client -->
  <rect x="380" y="190" width="220" height="44" rx="8" fill="#0f1d0b" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="490" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">Reference Desktop client</text>
  <text x="490" y="225" text-anchor="middle" font-size="9" fill="#8b949e">first-party reference UI</text>

  <!-- TUI (now green) -->
  <rect x="660" y="190" width="120" height="44" rx="8" fill="#0f1d0b" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="720" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">TUI</text>
  <text x="720" y="225" text-anchor="middle" font-size="9" fill="#8b949e">terminal UI</text>

  <!-- Reference Desktop --> ACP+ -->
  <line x1="490" y1="234" x2="540" y2="285" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TUI --> ACP+ -->
  <line x1="720" y1="234" x2="640" y2="285" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ACP+ protocol bar                           -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="400" y="290" width="380" height="42" rx="8" fill="#2d1f00" stroke="#ffa657" stroke-width="2" filter="url(#shadow)"/>
  <text x="590" y="316" text-anchor="middle" font-size="14" font-weight="700" fill="#ffa657">ACP+</text>

  <!-- ... (future experiences) --> ACP+ -->
  <rect x="180" y="200" width="100" height="34" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="230" y="222" text-anchor="middle" font-size="14" font-weight="600" fill="#8b949e">…</text>
  <line x1="280" y1="217" x2="400" y2="300" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Goose Perception ↔ ACP+ -->
  <rect x="180" y="255" width="100" height="40" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="276" text-anchor="middle" font-size="12" font-weight="600" fill="#58a6ff">Goose</text>
  <text x="230" y="290" text-anchor="middle" font-size="12" font-weight="600" fill="#58a6ff">Perception</text>
  <line x1="280" y1="280" x2="400" y2="310" stroke="#8b949e" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- ACP+ --> Goose Core -->
  <line x1="590" y1="332" x2="590" y2="385" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- GOOSE CORE                                  -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="400" y="385" width="380" height="205" rx="12" fill="#161b22" stroke="#7ee787" stroke-width="2" filter="url(#shadow)"/>
  <text x="590" y="413" text-anchor="middle" font-size="15" font-weight="700" fill="#7ee787">Goose Core</text>
  <line x1="420" y1="423" x2="760" y2="423" stroke="#30363d" stroke-width="1"/>

  <text x="420" y="443" font-size="10" fill="#e6edf3">• Agent loop</text>
  <text x="420" y="459" font-size="10" fill="#e6edf3">• Sessions</text>
  <text x="420" y="475" font-size="10" fill="#e6edf3">• Extensions</text>
  <text x="420" y="491" font-size="10" fill="#e6edf3">• Security</text>
  <text x="560" y="443" font-size="10" fill="#e6edf3">• Sub-agents</text>
  <text x="560" y="459" font-size="10" fill="#e6edf3">• Context mgmt</text>
  <text x="560" y="475" font-size="10" fill="#e6edf3">• Scheduling</text>
  <!-- Striped underlays for "not started" items -->
  <rect x="558" y="481" width="130" height="13" rx="2" fill="url(#stripeGreenInline)" stroke="#7ee787" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="560" y="491" font-size="10" fill="#7ee787">• Sandbox</text>
  <rect x="558" y="497" width="130" height="13" rx="2" fill="url(#stripeGreenInline)" stroke="#7ee787" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="560" y="507" font-size="10" fill="#7ee787">• Benchmarking</text>
  <rect x="558" y="513" width="170" height="13" rx="2" fill="url(#stripeGreenInline)" stroke="#7ee787" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="560" y="523" font-size="10" fill="#7ee787">• Model fit optimisation</text>

  <!-- CLI nested inside Goose Core -->
  <rect x="420" y="535" width="120" height="44" rx="8" fill="#0f1d0b" stroke="#7ee787" stroke-width="1.5"/>
  <text x="480" y="555" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">CLI</text>
  <text x="480" y="570" text-anchor="middle" font-size="9" fill="#8b949e">first-party binary</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- MCP / Skills / Plugins — now LEFT of Core   -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="240" y="395" width="130" height="40" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="305" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">MCP</text>

  <rect x="240" y="445" width="130" height="40" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="305" y="470" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">Skills</text>

  <rect x="240" y="495" width="130" height="40" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="305" y="520" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">Plugins</text>

  <!-- A2A (dotted, orange) — below Plugins -->
  <rect x="240" y="545" width="130" height="40" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="305" y="570" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">A2A</text>

  <!-- Goose Core ← MCP / Skills / Plugins / A2A (arrows from left into Core) -->
  <line x1="370" y1="415" x2="400" y2="437" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="465" x2="400" y2="465" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="515" x2="400" y2="495" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="565" x2="400" y2="555" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- RUST API + language bindings + SPROUT       -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Rust API box (right of Goose Core) -->
  <rect x="820" y="425" width="140" height="50" rx="10" fill="url(#stripeGreen)" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="890" y="448" text-anchor="middle" font-size="13" font-weight="700" fill="#7ee787">Rust API</text>
  <text x="890" y="463" text-anchor="middle" font-size="9" fill="#8b949e">native crate / FFI</text>

  <!-- Goose Core ↔ Rust API -->
  <line x1="780" y1="450" x2="820" y2="450" stroke="#8b949e" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- Language bindings cluster (off Rust API, to the right) -->
  <rect x="820" y="160" width="140" height="40" rx="8" fill="url(#stripeGreen)" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="890" y="184" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">Swift</text>

  <rect x="820" y="210" width="140" height="40" rx="8" fill="url(#stripeGreen)" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="890" y="234" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">Kotlin</text>

  <rect x="820" y="260" width="140" height="40" rx="8" fill="#0f1d0b" stroke="#7ee787" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="890" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">…</text>
  <text x="890" y="294" text-anchor="middle" font-size="8" fill="#8b949e">Python · TS · Go</text>

  <!-- Language bindings → Rust API (arrows going down) -->
  <line x1="890" y1="300" x2="890" y2="425" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Sprout (blue) connecting to Rust API -->
  <rect x="820" y="510" width="140" height="50" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="890" y="533" text-anchor="middle" font-size="13" font-weight="700" fill="#58a6ff">Applications ...</text>
  <text x="890" y="548" text-anchor="middle" font-size="9" fill="#8b949e">embedder / host app</text>

  <!-- Sprout --> Rust API -->
  <line x1="890" y1="510" x2="890" y2="475" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- PROVIDERS LAYER                             -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Goose Core --> Providers bar -->
  <line x1="590" y1="590" x2="590" y2="625" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Providers bar -->
  <rect x="160" y="625" width="800" height="42" rx="8" fill="#0f1d0b" stroke="#7ee787" stroke-width="2" filter="url(#shadow)"/>
  <text x="320" y="651" text-anchor="middle" font-size="14" font-weight="700" fill="#7ee787">Providers</text>

  <!-- Routing chip nested inside Providers bar -->
  <rect x="780" y="634" width="160" height="24" rx="6" fill="url(#stripeGreen)" stroke="#7ee787" stroke-width="1.5"/>
  <text x="860" y="651" text-anchor="middle" font-size="11" font-weight="700" fill="#7ee787">Routing</text>

  <!-- Lines from Providers bar down to each child -->
  <line x1="230" y1="667" x2="230" y2="725" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="667" x2="450" y2="725" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="670" y1="667" x2="670" y2="725" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="880" y1="667" x2="880" y2="725" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Cloud Models -->
  <rect x="150" y="725" width="160" height="60" rx="10" fill="#161b22" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="750" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">Cloud Models</text>
  <text x="230" y="767" text-anchor="middle" font-size="9" fill="#8b949e">OpenAI · Anthropic · Google</text>
  <text x="230" y="779" text-anchor="middle" font-size="9" fill="#8b949e">Azure · Bedrock · …</text>

  <!-- Declarative Providers -->
  <rect x="360" y="725" width="180" height="60" rx="10" fill="#161b22" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="745" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">Declarative</text>
  <text x="450" y="760" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">Providers</text>
  <text x="450" y="779" text-anchor="middle" font-size="9" fill="#8b949e">YAML / config-driven</text>

  <!-- Local Models -->
  <rect x="600" y="725" width="140" height="60" rx="10" fill="#161b22" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="750" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">Local Models</text>
  <text x="670" y="767" text-anchor="middle" font-size="9" fill="#8b949e">Ollama · llama.cpp</text>
  <text x="670" y="779" text-anchor="middle" font-size="9" fill="#8b949e">GGUF · MLX</text>

  <!-- Mesh -->
  <rect x="810" y="725" width="140" height="60" rx="10" fill="#161b22" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="880" y="750" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">Mesh</text>
  <text x="880" y="767" text-anchor="middle" font-size="9" fill="#8b949e">Distributed inference</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ACP connects directly to the Providers bar  -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="260" y="820" width="160" height="42" rx="8" fill="#2d1f00" stroke="#ffa657" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="846" text-anchor="middle" font-size="13" font-weight="700" fill="#ffa657">ACP</text>

  <!-- Providers bar left edge down to ACP -->
  <polyline points="160,646 80,646 80,841 260,841" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Other Agents -->
  <rect x="470" y="835" width="150" height="40" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="545" y="860" text-anchor="middle" font-size="10" font-weight="600" fill="#58a6ff">Other Agents</text>
  <rect x="490" y="820" width="150" height="40" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="565" y="845" text-anchor="middle" font-size="11" font-weight="600" fill="#58a6ff">Claude Code …</text>

  <!-- Agents --> ACP -->
  <line x1="490" y1="841" x2="420" y2="841" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

</svg>
