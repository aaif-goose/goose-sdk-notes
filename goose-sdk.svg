<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#8b949e"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    <!-- Diagonal stripe pattern for "Not started" items -->
    <pattern id="stripeGreen" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#0f1d0b"/>
      <rect width="3" height="8" fill="#7ee787" fill-opacity="0.22"/>
    </pattern>
    <pattern id="stripeGreenInline" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#161b22"/>
      <rect width="2" height="6" fill="#7ee787" fill-opacity="0.28"/>
    </pattern>
  </defs>

  <rect width="1040" height="880" fill="#0d1117"/>

  <!-- Title -->
  <text x="20" y="20" font-size="13" font-weight="700" fill="#e6edf3">Goose SDK — architecture</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- KEY                                         -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="20" y="35" width="220" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="40" y="57" font-size="11" font-weight="700" fill="#e6edf3">Key</text>
  <line x1="40" y1="65" x2="220" y2="65" stroke="#30363d" stroke-width="1"/>
  <rect x="40" y="73" width="14" height="14" rx="3" fill="none" stroke="#7ee787" stroke-width="2"/>
  <text x="62" y="85" font-size="10" fill="#e6edf3">Goose core responsibility</text>
  <rect x="40" y="93" width="14" height="14" rx="3" fill="none" stroke="#58a6ff" stroke-width="2"/>
  <text x="62" y="105" font-size="10" fill="#e6edf3">Community &amp; 3rd party</text>
  <rect x="40" y="113" width="14" height="14" rx="3" fill="none" stroke="#ffa657" stroke-width="2"/>
  <text x="62" y="125" font-size="10" fill="#e6edf3">Open protocols &amp; standards</text>
  <rect x="40" y="133" width="14" height="14" rx="3" fill="url(#stripeGreen)" stroke="#7ee787" stroke-width="2"/>
  <text x="62" y="145" font-size="10" fill="#e6edf3">In progress</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SURFACES: Reference Desktop client, TUI,    -->
  <!-- Applications                                -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Reference Desktop client -->
  <rect x="380" y="190" width="220" height="44" rx="8" fill="#0f1d0b" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="490" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">Reference Desktop client</text>
  <text x="490" y="225" text-anchor="middle" font-size="9" fill="#8b949e">first-party reference UI</text>

  <!-- TUI -->
  <rect x="630" y="190" width="110" height="44" rx="8" fill="#0f1d0b" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="685" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">TUI</text>
  <text x="685" y="225" text-anchor="middle" font-size="9" fill="#8b949e">terminal UI</text>

  <!-- Applications (blue app surface) — sits directly over the Rust API arm -->
  <rect x="775" y="190" width="140" height="44" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="845" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#58a6ff">Applications …</text>
  <text x="845" y="225" text-anchor="middle" font-size="9" fill="#8b949e">embedder / host app</text>

  <!-- Reference Desktop --> ACP+ -->
  <line x1="490" y1="234" x2="535" y2="277" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TUI --> ACP+ -->
  <line x1="685" y1="234" x2="632" y2="277" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Applications --> Rust API arm (in-process, peer of ACP+) -->
  <line x1="845" y1="234" x2="830" y2="277" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ACP+ protocol bar (rides on the Rust API)   -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="400" y="282" width="330" height="42" rx="8" fill="#2d1f00" stroke="#ffa657" stroke-width="2" filter="url(#shadow)"/>
  <text x="565" y="308" text-anchor="middle" font-size="14" font-weight="700" fill="#ffa657">ACP+</text>

  <!-- ... (future experiences) --> ACP+ -->
  <rect x="170" y="162" width="120" height="28" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="230" y="181" text-anchor="middle" font-size="14" font-weight="600" fill="#8b949e">…</text>
  <line x1="290" y1="176" x2="400" y2="288" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Buzz --> ACP+ -->
  <rect x="170" y="196" width="120" height="32" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="216" text-anchor="middle" font-size="12" font-weight="600" fill="#58a6ff">Buzz</text>
  <line x1="290" y1="212" x2="400" y2="294" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Block's enterprise client --> ACP+ -->
  <rect x="170" y="234" width="120" height="36" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="249" text-anchor="middle" font-size="11" font-weight="600" fill="#58a6ff">Block&#8217;s enterprise</text>
  <text x="230" y="263" text-anchor="middle" font-size="11" font-weight="600" fill="#58a6ff">client</text>
  <line x1="290" y1="252" x2="400" y2="300" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Goose Perception ↔ ACP+ -->
  <rect x="170" y="276" width="120" height="40" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="293" text-anchor="middle" font-size="12" font-weight="600" fill="#58a6ff">Goose</text>
  <text x="230" y="307" text-anchor="middle" font-size="12" font-weight="600" fill="#58a6ff">Perception</text>
  <line x1="290" y1="298" x2="400" y2="308" stroke="#8b949e" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- CLI — first-party binary, in-process on the Rust API -->
  <rect x="250" y="335" width="115" height="44" rx="8" fill="#0f1d0b" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="307" y="355" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">CLI</text>
  <text x="307" y="370" text-anchor="middle" font-size="9" fill="#8b949e">first-party binary</text>
  <line x1="365" y1="357" x2="398" y2="357" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- RUST API — L-shaped layer:                  -->
  <!-- horizontal bar under ACP+ (ACP+ depends on  -->
  <!-- it), vertical arm rising beside ACP+ as a   -->
  <!-- peer surface for in-process embedding       -->
  <!-- ═══════════════════════════════════════════ -->
  <path d="M 408 338
           H 746 Q 750 338 750 334
           V 290 Q 750 282 758 282
           H 882 Q 890 282 890 290
           V 368 Q 890 376 882 376
           H 408 Q 400 376 400 368
           V 346 Q 400 338 408 338 Z"
        fill="url(#stripeGreen)" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="820" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#7ee787">Rust API</text>
  <text x="820" y="336" text-anchor="middle" font-size="9" fill="#8b949e">native crate / FFI</text>
  <text x="420" y="361" font-size="10" fill="#7ee787" fill-opacity="0.85">in-process</text>

  <!-- ACP+ sits on the Rust API -->
  <line x1="470" y1="326" x2="470" y2="336" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="326" x2="660" y2="336" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Rust API sits on Goose Core -->
  <line x1="470" y1="378" x2="470" y2="393" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="378" x2="660" y2="393" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Language bindings — small, off the side of the Rust API arm -->
  <rect x="920" y="288" width="100" height="26" rx="6" fill="url(#stripeGreen)" stroke="#7ee787" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="970" y="305" text-anchor="middle" font-size="10" font-weight="700" fill="#7ee787">Swift</text>
  <line x1="920" y1="301" x2="893" y2="301" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="920" y="320" width="100" height="26" rx="6" fill="url(#stripeGreen)" stroke="#7ee787" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="970" y="337" text-anchor="middle" font-size="10" font-weight="700" fill="#7ee787">Kotlin</text>
  <line x1="920" y1="333" x2="893" y2="333" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="920" y="352" width="100" height="26" rx="6" fill="#0f1d0b" stroke="#7ee787" stroke-width="1.2" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="970" y="363" text-anchor="middle" font-size="10" font-weight="700" fill="#7ee787">…</text>
  <text x="970" y="373" text-anchor="middle" font-size="7" fill="#8b949e">Python · TS · Go</text>
  <line x1="920" y1="365" x2="893" y2="365" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- GOOSE CORE                                  -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="400" y="395" width="490" height="170" rx="12" fill="#161b22" stroke="#7ee787" stroke-width="2" filter="url(#shadow)"/>
  <text x="645" y="421" text-anchor="middle" font-size="15" font-weight="700" fill="#7ee787">Goose Core</text>
  <line x1="420" y1="431" x2="870" y2="431" stroke="#30363d" stroke-width="1"/>

  <text x="430" y="451" font-size="10" fill="#e6edf3">• Agent loop</text>
  <text x="430" y="467" font-size="10" fill="#e6edf3">• Sessions</text>
  <text x="430" y="483" font-size="10" fill="#e6edf3">• Extensions</text>
  <text x="430" y="499" font-size="10" fill="#e6edf3">• Security</text>
  <text x="430" y="515" font-size="10" fill="#e6edf3">• Code Mode</text>
  <text x="620" y="451" font-size="10" fill="#e6edf3">• Subagents</text>
  <text x="620" y="467" font-size="10" fill="#e6edf3">• Context mgmt</text>
  <text x="620" y="483" font-size="10" fill="#e6edf3">• Automations &amp; scheduling</text>
  <!-- Striped underlays for "in progress" items -->
  <rect x="618" y="489" width="160" height="13" rx="2" fill="url(#stripeGreenInline)" stroke="#7ee787" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="620" y="499" font-size="10" fill="#7ee787">• Pluggable memory system</text>
  <rect x="618" y="505" width="160" height="13" rx="2" fill="url(#stripeGreenInline)" stroke="#7ee787" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="620" y="515" font-size="10" fill="#7ee787">• Sandbox / run anywhere</text>
  <rect x="618" y="521" width="160" height="13" rx="2" fill="url(#stripeGreenInline)" stroke="#7ee787" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="620" y="531" font-size="10" fill="#7ee787">• Router / model selection</text>
  <rect x="618" y="537" width="160" height="13" rx="2" fill="url(#stripeGreenInline)" stroke="#7ee787" stroke-width="0.6" stroke-opacity="0.5"/>
  <text x="620" y="547" font-size="10" fill="#7ee787">• Benchmarking</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- MCP / Skills / Plugins — LEFT of Core       -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="240" y="395" width="130" height="40" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="305" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">MCP</text>

  <rect x="240" y="445" width="130" height="40" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="305" y="470" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">Skills</text>

  <rect x="240" y="495" width="130" height="40" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="305" y="520" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">Plugins</text>

  <!-- A2A (dotted, orange) — below Plugins -->
  <rect x="240" y="545" width="130" height="40" rx="8" fill="#161b22" stroke="#ffa657" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="305" y="570" text-anchor="middle" font-size="12" font-weight="600" fill="#ffa657">A2A</text>

  <!-- Goose Core ← MCP / Skills / Plugins / A2A (arrows from left into Core) -->
  <line x1="370" y1="415" x2="400" y2="437" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="465" x2="400" y2="465" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="515" x2="400" y2="500" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="370" y1="565" x2="400" y2="540" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- PROVIDERS LAYER                             -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Goose Core --> Providers bar -->
  <line x1="590" y1="565" x2="590" y2="625" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Providers bar -->
  <rect x="160" y="625" width="800" height="42" rx="8" fill="#0f1d0b" stroke="#7ee787" stroke-width="2" filter="url(#shadow)"/>
  <text x="320" y="651" text-anchor="middle" font-size="14" font-weight="700" fill="#7ee787">Providers</text>

  <!-- Router chip nested inside Providers bar (see "Router / model selection" in Core) -->
  <rect x="780" y="634" width="160" height="24" rx="6" fill="url(#stripeGreen)" stroke="#7ee787" stroke-width="1.5"/>
  <text x="860" y="651" text-anchor="middle" font-size="11" font-weight="700" fill="#7ee787">Router</text>

  <!-- Lines from Providers bar down to each child -->
  <line x1="230" y1="667" x2="230" y2="725" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="667" x2="450" y2="725" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="670" y1="667" x2="670" y2="725" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="880" y1="667" x2="880" y2="725" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Cloud Models -->
  <rect x="150" y="725" width="160" height="60" rx="10" fill="#161b22" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="750" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">Cloud Models</text>
  <text x="230" y="767" text-anchor="middle" font-size="9" fill="#8b949e">OpenAI · Anthropic · Google</text>
  <text x="230" y="779" text-anchor="middle" font-size="9" fill="#8b949e">Azure · Bedrock · …</text>

  <!-- Declarative Providers -->
  <rect x="360" y="725" width="180" height="60" rx="10" fill="#161b22" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="745" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">Declarative</text>
  <text x="450" y="760" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">Providers</text>
  <text x="450" y="779" text-anchor="middle" font-size="9" fill="#8b949e">YAML / config-driven</text>

  <!-- Local Models -->
  <rect x="600" y="725" width="140" height="60" rx="10" fill="#161b22" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="750" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">Local Models</text>
  <text x="670" y="767" text-anchor="middle" font-size="9" fill="#8b949e">Ollama · llama.cpp</text>
  <text x="670" y="779" text-anchor="middle" font-size="9" fill="#8b949e">GGUF · MLX</text>

  <!-- Mesh -->
  <rect x="810" y="725" width="140" height="60" rx="10" fill="#161b22" stroke="#7ee787" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="880" y="750" text-anchor="middle" font-size="12" font-weight="700" fill="#7ee787">Mesh</text>
  <text x="880" y="767" text-anchor="middle" font-size="9" fill="#8b949e">Distributed inference</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ACP connects directly to the Providers bar  -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="260" y="820" width="160" height="42" rx="8" fill="#2d1f00" stroke="#ffa657" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="846" text-anchor="middle" font-size="13" font-weight="700" fill="#ffa657">ACP</text>

  <!-- Providers bar left edge down to ACP -->
  <polyline points="160,646 80,646 80,841 260,841" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Other Agents — a natural-looking cascade of cards -->
  <text x="500" y="798" font-size="9" font-style="italic" fill="#8b949e">Other Agents</text>

  <rect x="521" y="804" width="150" height="40" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.55"/>
  <text x="533" y="818" font-size="10" font-weight="600" fill="#58a6ff" fill-opacity="0.55">Gemini CLI …</text>

  <rect x="505" y="820" width="150" height="40" rx="8" fill="#11161d" stroke="#58a6ff" stroke-width="1.2" stroke-opacity="0.75"/>
  <text x="517" y="834" font-size="10" font-weight="600" fill="#58a6ff" fill-opacity="0.75">Codex</text>

  <rect x="489" y="836" width="150" height="40" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="564" y="861" text-anchor="middle" font-size="11" font-weight="600" fill="#58a6ff">Claude Code</text>

  <!-- Agents --> ACP -->
  <line x1="489" y1="852" x2="420" y2="846" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

</svg>
